name: conectamos_platform
description: "ConectamOS — Plataforma de operaciones internas."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Router
  go_router: ^14.6.3

  # HTTP
  dio: ^5.8.0+1
  http_parser: ^4.0.2

  # Auth + DB
  supabase_flutter: ^2.9.0

  # SVG
  flutter_svg: ^2.0.10+1

  # URL launcher
  url_launcher: ^6.3.1

  # Date formatting
  intl: ^0.19.0

  # File picker & drag-drop (multimedia)
  file_picker: ^8.0.0
  desktop_drop: ^0.4.4

  # Sticky headers
  sticky_headers: ^0.3.0

  # Maps (execution detail — location field renderer)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Path URL strategy (Flutter Web)
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/Conectamos-Imagotipo.svg
    - assets/images/Conectamos-Isotipo.svg
    - assets/images/Conectamos-Logotipo.svg
    - assets/images/login_background.svg
    - assets/logos/

  fonts:
    - family: Onest
      fonts:
        - asset: assets/fonts/Onest-VariableFont_wght.ttf
          weight: 100
        - asset: assets/fonts/Onest-VariableFont_wght.ttf
          weight: 200
        - asset: assets/fonts/Onest-VariableFont_wght.ttf
          weight: 300
        - asset: assets/fonts/Onest-VariableFont_wght.ttf
          weight: 400
        - asset: assets/fonts/Onest-VariableFont_wght.ttf
          weight: 500
        - asset: assets/fonts/Onest-VariableFont_wght.ttf
          weight: 600
        - asset: assets/fonts/Onest-VariableFont_wght.ttf
          weight: 700
        - asset: assets/fonts/Onest-VariableFont_wght.ttf
          weight: 800
        - asset: assets/fonts/Onest-VariableFont_wght.ttf
          weight: 900
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-VariableFont_wght.ttf
          weight: 100
        - asset: assets/fonts/Geist-VariableFont_wght.ttf
          weight: 200
        - asset: assets/fonts/Geist-VariableFont_wght.ttf
          weight: 300
        - asset: assets/fonts/Geist-VariableFont_wght.ttf
          weight: 400
        - asset: assets/fonts/Geist-VariableFont_wght.ttf
          weight: 500
        - asset: assets/fonts/Geist-VariableFont_wght.ttf
          weight: 600
        - asset: assets/fonts/Geist-VariableFont_wght.ttf
          weight: 700
        - asset: assets/fonts/Geist-VariableFont_wght.ttf
          weight: 800
        - asset: assets/fonts/Geist-VariableFont_wght.ttf
          weight: 900
