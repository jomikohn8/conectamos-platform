name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: |
          flutter build web --release \
            --dart-define=API_BASE_URL=${{ secrets.DART_DEFINE_API_BASE_URL }} \
            --dart-define=SUPABASE_URL=${{ secrets.DART_DEFINE_SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.DART_DEFINE_SUPABASE_ANON_KEY }} \
            --dart-define=MOCK_MODE=${{ secrets.DART_DEFINE_MOCK_MODE }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }}
