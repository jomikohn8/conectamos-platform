name: Deploy to AWS (S3 + CloudFront)

on:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [production, development]
        default: production

jobs:
  deploy:
    name: Deploy (${{ github.ref_name == 'main' && 'production' || 'development' }})
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      site_url: ${{ steps.site_url.outputs.url }}

    env:
      IS_PROD: ${{ github.ref_name == 'main' || github.event.inputs.environment == 'production' }}
      TF_WORKSPACE: ${{ (github.ref_name == 'main' || github.event.inputs.environment == 'production') && 'platform-frontend' || 'platform-frontend-dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Flutter build ─────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: |
          flutter build web --release \
            --dart-define=API_BASE_URL=${{ env.IS_PROD == 'true' && 'https://platform-api.conectamos.mx' || 'https://platform-api-dev.conectamos.mx' }} \
            --dart-define=SUPABASE_URL=${{ env.IS_PROD == 'true' && secrets.DART_DEFINE_SUPABASE_URL || secrets.DART_DEFINE_SUPABASE_URL_DEV }} \
            --dart-define=SUPABASE_ANON_KEY=${{ env.IS_PROD == 'true' && secrets.DART_DEFINE_SUPABASE_ANON_KEY || secrets.DART_DEFINE_SUPABASE_ANON_KEY_DEV }} \
            --dart-define=MOCK_MODE=false

      # ── AWS credentials (OIDC) ────────────────────────────────────────────────
      # TODO: mover a AWS_PROD_KEY / AWS_DEV_KEY cuando esas cuentas estén bootstrappeadas.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_AI_KEY }}
          aws-region: us-east-1

      # ── Terraform ─────────────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # First deploy only: creates ACM cert so we can read the validation CNAMEs.
      # Subsequent deploys: this is a no-op (cert already exists).
      - name: Terraform Apply (ACM cert)
        working-directory: terraform
        run: terraform apply -auto-approve -target=aws_acm_certificate.app

      # Add these CNAMEs to Cloudflare (DNS-only, no proxy) if not already present.
      # The next step will block until the cert reaches ISSUED state.
      - name: ACM validation CNAMEs
        working-directory: terraform
        run: terraform output -json acm_certificate_validation_records

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      # ── Get terraform outputs ─────────────────────────────────────────────────
      - name: Get Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          echo "bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT
          echo "dist_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "site_url=$(terraform output -raw site_url)" >> $GITHUB_OUTPUT

      # ── Deploy to S3 ──────────────────────────────────────────────────────────
      # Flutter hashes asset filenames → all assets get long-lived cache.
      # index.html is NOT hashed → no-cache so browsers always fetch the latest.
      - name: Sync assets to S3 (long-lived cache)
        run: |
          aws s3 sync build/web s3://${{ steps.tf.outputs.bucket }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp build/web/index.html s3://${{ steps.tf.outputs.bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      # ── Invalidate CloudFront ─────────────────────────────────────────────────
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf.outputs.dist_id }} \
            --paths "/*"

      # ── Compute service URL for notify ────────────────────────────────────────
      - name: Compute site URL
        id: site_url
        run: echo "url=${{ steps.tf.outputs.site_url }}" >> $GITHUB_OUTPUT

  # ── Notify ────────────────────────────────────────────────────────────────────
  notify:
    name: notify
    needs: deploy
    if: always()
    uses: conectamos-mx/.github/.github/workflows/notification.yml@main
    with:
      status: ${{ needs.deploy.result == 'success' && 'success' || 'failure' }}
      environment: ${{ (github.ref_name == 'main' || github.event.inputs.environment == 'production') && 'Production' || 'Development' }}
      service_name: "conectamos-platform"
      service_url: ${{ needs.deploy.result == 'success' && ((github.ref_name == 'main' || github.event.inputs.environment == 'production') && 'https://platform.conectamos.mx' || 'https://platform-dev.conectamos.mx') || 'N/A' }}
      commit_sha: ${{ github.sha }}
      actor: ${{ github.actor }}
      run_id: ${{ github.run_id }}
      repository: ${{ github.repository }}
    secrets: inherit
